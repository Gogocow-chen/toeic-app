        let currentUser = null;
        let currentFilter = 'all';
        let userProgress = {}; 

        // ----------------- Authentication 權限邏輯 -----------------
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-panel').classList.remove('hidden');
                document.getElementById('user-email').innerText = `帳號：${user.email}`;
                loadProgressAndRender();
            } else {
                currentUser = null;
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('user-panel').classList.add('hidden');
            }
        });

        // 註冊
        document.getElementById('btn-register').addEventListener('click', () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return alert('請輸入完整的信箱與密碼！');
            
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert('註冊成功！'))
                .catch(err => alert('註冊失敗：' + err.message));
        });

        // 登入
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return alert('請輸入完整的信箱與密碼！');

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => alert('登入失敗：' + err.message));
        });

        // 登出
        document.getElementById('btn-logout').addEventListener('click', () => {
            auth.signOut().then(() => {
                userProgress = {};
                document.getElementById('vocab-container').innerHTML = '';
            });
        });

        // ----------------- 雲端資料加載 -----------------
        function loadProgressAndRender() {
            if (!currentUser) return;
            
            db.collection('users').doc(currentUser.uid).get()
                .then(doc => {
                    if (doc.exists) {
                        userProgress = doc.data().progress || {};
                    } else {
                        userProgress = {};
                    }
                    renderVocabulary();
                })
                .catch(err => {
                    console.error("載入進度失敗，將使用本地預設狀態", err);
                    renderVocabulary();
                });
        }

        // ----------------- 核心卡片渲染 -----------------
        function renderVocabulary() {
            const container = document.getElementById('vocab-container');
            container.innerHTML = '';
            
            let filteredList = defaultVocabularyList.filter(item => {
                const status = userProgress[item.id] || 'unmarked';
                if (currentFilter === 'blurred') return status === 'blurred';
                if (currentFilter === 'clear') return status === 'clear';
                return true;
            });

            filteredList.forEach(item => {
                const status = userProgress[item.id] || 'unmarked';
                
                let cardBorderClass = 'border-slate-100';
                if (status === 'clear') cardBorderClass = 'border-l-8 border-l-emerald-500 border-y-slate-100 border-r-slate-100';
                if (status === 'blurred') cardBorderClass = 'border-l-8 border-l-amber-500 border-y-slate-100 border-r-slate-100';

                // 拆解例句
                const sentenceWords = item.sentence.split(' ');
                const formattedSentenceHtml = sentenceWords.map(rawWord => {
                    const cleanWord = rawWord.toLowerCase().replace(/[^a-zA-Z-]/g, '');
                    if (miniDict[cleanWord]) {
                        return `<span class="clickable-word" onclick="showPopover(event, '${cleanWord}')">${rawWord}</span>`;
                    }
                    return rawWord;
                }).join(' ');

                const cardHtml = `
                    <div class="bg-white rounded-2xl p-6 border ${cardBorderClass} shadow-sm transition-all hover:shadow-md">
                        <div class="flex justify-between items-center mb-4">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold">${item.category}</span>
                            <div class="flex gap-2">
                                <button onclick="updateCloudStatus('${item.id}', 'clear')" class="px-2.5 py-1 text-xs font-bold rounded-lg ${status === 'clear' ? 'bg-emerald-500 text-white' : 'bg-slate-100 hover:bg-emerald-50 text-slate-500 hover:text-emerald-600'} transition-all">
                                    🟢 清楚
                                </button>
                                <button onclick="updateCloudStatus('${item.id}', 'blurred')" class="px-2.5 py-1 text-xs font-bold rounded-lg ${status === 'blurred' ? 'bg-amber-500 text-white' : 'bg-slate-100 hover:bg-amber-50 text-slate-500 hover:text-amber-600'} transition-all">
                                    🟡 模糊
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 mb-2">
                            <h3 class="text-2xl font-black text-slate-900 tracking-tight">${item.word}</h3>
                            <span class="text-slate-400 font-mono text-sm">${item.ipa}</span>
                            <button onclick="playAudio('${item.word}', true)" class="w-8 h-8 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 flex items-center justify-center transition-all">
                                <i class="fa-solid fa-volume-high text-xs"></i>
                            </button>
                        </div>

                        <p class="text-base font-bold text-slate-700 mb-4">${item.meaning}</p>
                        
                        <div class="bg-amber-50/50 border border-amber-100/50 rounded-xl p-3 mb-4">
                            <p class="text-xs text-amber-800 font-medium leading-relaxed">
                                <i class="fa-solid fa-lightbulb text-amber-500 mr-1.5"></i><strong>字根記憶：</strong>${item.tip}
                            </p>
                        </div>

                        <div class="bg-blue-50/40 border border-blue-100/30 rounded-xl p-3.5 mb-4">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">多益精選搭配詞</span>
                                <button onclick="playAudio('${item.col}', false)" class="w-6 h-6 rounded-full bg-blue-100 hover:bg-blue-200 text-blue-700 flex items-center justify-center transition-all">
                                    <i class="fa-solid fa-volume-high text-[10px]"></i>
                                </button>
                            </div>
                            <p class="text-sm font-black text-blue-900">${item.col}</p>
                            <p class="text-xs text-slate-500 font-medium mt-0.5">${item.colMean}</p>
                        </div>

                        <div class="border-t border-slate-100 pt-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">實戰商務例句</span>
                                <button onclick="playAudio('${item.sentence.replace(/'/g, "\\'")}', false)" class="w-7 h-7 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 flex items-center justify-center transition-all">
                                    <i class="fa-solid fa-volume-high text-[11px]"></i>
                                </button>
                            </div>
                            <p class="text-sm text-slate-800 font-semibold leading-relaxed mb-1">${formattedSentenceHtml}</p>
                            <p class="text-xs text-slate-500 font-medium">${item.sentenceMean}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // ----------------- 即時狀態同步雲端 -----------------
        function updateCloudStatus(vocabId, status) {
            if (!currentUser) return;

            userProgress[vocabId] = status;
            renderVocabulary();

            db.collection('users').doc(currentUser.uid).set({
                progress: userProgress
            }, { merge: true })
            .then(() => {
                console.log(`[雲端同步成功] 單字:${vocabId} 狀態已變更為: ${status}`);
            })
            .catch(err => {
                console.error("雲端同步失敗", err);
            });
        }

        // 篩選器切換
        function filterVocab(type) {
            currentFilter = type;
            
            const btnAll = document.getElementById('btn-filter-all');
            const btnBlurred = document.getElementById('btn-filter-blurred');
            const btnClear = document.getElementById('btn-filter-clear');

            [btnAll, btnBlurred, btnClear].forEach(btn => {
                btn.className = "px-4 py-2 bg-white border border-slate-200 text-slate-600 text-sm font-semibold rounded-xl transition-all";
            });

            if (type === 'all') {
                btnAll.className = "px-4 py-2 bg-blue-50 border border-blue-200 text-blue-700 text-sm font-bold rounded-xl transition-all";
            } else if (type === 'blurred') {
                btnBlurred.className = "px-4 py-2 bg-amber-50 border border-amber-200 text-amber-700 text-sm font-bold rounded-xl transition-all";
            } else if (type === 'clear') {
                btnClear.className = "px-4 py-2 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm font-bold rounded-xl transition-all";
            }

            renderVocabulary();
        }

        // ----------------- 🛠️ 升級版「全域口音同步」語音模組 -----------------
        function playAudio(text, isMainWord = false) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // 停止目前播放

            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();

            // 讀取當前使用者在畫面上選擇的口音設定
            const accentSetting = document.getElementById('accent-select').value;

            if (accentSetting === 'random') {
                // 🔹 模式一：原本的隨機多益口音輪播 (英、美、澳、加)
                if (isMainWord) {
                    const mainVoice = voices.find(v => 
                        v.lang.startsWith('en-US') && 
                        (v.name.includes('Ava') || v.name.includes('Samantha'))
                    ) || voices.find(v => v.lang.startsWith('en-US'));
                    if (mainVoice) utterance.voice = mainVoice;
                    utterance.rate = 0.85;
                } else {
                    const targetLangs = ['en-US', 'en-GB', 'en-AU', 'en-CA'];
                    const accentVoices = voices.filter(v => 
                        targetLangs.some(lang => v.lang.startsWith(lang)) &&
                        !['Fred', 'Albert', 'Boing', 'Whisper'].some(bad => v.name.includes(bad))
                    );

                    if (accentVoices.length > 0) {
                        const randomVoice = accentVoices[Math.floor(Math.random() * accentVoices.length)];
                        utterance.voice = randomVoice;
                        console.log(`[多益聽力模擬] 隨機指派講師：${randomVoice.name} (${randomVoice.lang})`);
                    }
                    utterance.rate = 0.8;
                }
            } else {
                // 🔹 模式二：強制全螢幕同步單一口音 (US / GB / AU / CA)
                // 在系統中搜尋符合該國家/地區編碼，且避開低音質的語音庫
                const selectedVoices = voices.filter(v => 
                    v.lang.startsWith(accentSetting) &&
                    !['Fred', 'Albert', 'Boing', 'Whisper'].some(bad => v.name.includes(bad))
                );

                if (selectedVoices.length > 0) {
                    // 優先尋找 Enhanced/Premium 或知名的高品質語音（例如 Ava、Serena、Karen、Linda 等）
                    const premiumVoice = selectedVoices.find(v => 
                        v.name.includes('Ava') || 
                        v.name.includes('Samantha') || 
                        v.name.includes('Serena') || 
                        v.name.includes('Karen') || 
                        v.name.includes('Linda') ||
                        v.name.includes('Enhanced')
                    ) || selectedVoices[0];
                    
                    utterance.voice = premiumVoice;
                    console.log(`[全域口音同步] 強制使用指定講師：${premiumVoice.name} (${premiumVoice.lang})`);
                }
                
                utterance.rate = isMainWord ? 0.85 : 0.8;
            }

            window.speechSynthesis.speak(utterance);
        }

        // 確保語音庫在瀏覽器準備好時完全加載
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }

        // ----------------- 智慧氣泡翻譯定位 -----------------
        const popover = document.getElementById('popover');

        function showPopover(event, word) {
            event.stopPropagation();
            event.preventDefault();

            const dictData = miniDict[word];
            if (!dictData) return;

            const ipaMatch = dictData.match(/^\[.*?\]/);
            const ipaStr = ipaMatch ? ipaMatch[0] : '';
            const meaningStr = dictData.replace(ipaStr, '').trim();

            document.getElementById('pop-word').innerText = word.charAt(0).toUpperCase() + word.slice(1);
            document.getElementById('pop-ipa').innerText = ipaStr;
            document.getElementById('pop-meaning').innerText = meaningStr;

            popover.style.display = 'block';

            const target = event.currentTarget;
            const rect = target.getBoundingClientRect();
            const popoverRect = popover.getBoundingClientRect();

            const topPos = rect.top + window.scrollY - popoverRect.height - 10;
            const leftPos = rect.left + window.scrollX + (rect.width / 2) - (popoverRect.width / 2);

            popover.style.top = `${topPos}px`;
            popover.style.left = `${leftPos}px`;

            // 同步呼叫單字發音 (會自動遵循下拉選單所選擇的口音！)
            playAudio(word, true);
        }

        document.addEventListener('click', () => {
            popover.style.display = 'none';
        });
    </script>
