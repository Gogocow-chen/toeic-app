    authSwitchBtn.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      authTitle.innerText = isRegisterMode ? "學員註冊" : "學員登入";
      authSubmitBtn.innerText = isRegisterMode ? "立即註冊" : "登入";

      authError.classList.add('hidden');
    });

    authSubmitBtn.addEventListener('click', () => {
      const email = authEmail.value.trim();
      const password = authPassword.value;
      authError.classList.add('hidden');

      if (!email || !password) {
        showAuthError("信箱與密碼欄位不可留白！");
        return;
      }

      if (isRegisterMode) {
        auth.createUserWithEmailAndPassword(email, password)
          .then(userCredential => {
            currentUser = userCredential.user;
            initUserDatabase(currentUser.uid);
          })
          .catch(error => showAuthError("註冊失敗：" + translateAuthError(error.code)));
      } else {
        auth.signInWithEmailAndPassword(email, password)
          .then(userCredential => {
            currentUser = userCredential.user;
            loadUserData(currentUser.uid);
          })
          .catch(error => showAuthError("登入失敗：" + translateAuthError(error.code)));
      }
    });

    logoutBtn.addEventListener('click', () => {
      auth.signOut().then(() => {
        currentUser = null;
        userProgress = {};
        toggleView(false);
      });
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadUserData(user.uid);
      } else {
        toggleView(false);
      }
    });

    function showAuthError(msg) {
      authError.innerText = msg;
      authError.classList.remove('hidden');
    }

    function translateAuthError(code) {
      switch (code) {
        case 'auth/email-already-in-use': return '該信箱已被註冊。';
        case 'auth/invalid-email': return '無效的電子信箱格式。';
        case 'auth/weak-password': return '密碼強度不足，最少需 6 碼。';
        case 'auth/wrong-password': return '密碼輸入錯誤。';
        case 'auth/user-not-found': return '找不到該帳號，請先進行註冊。';
        default: return '伺服器拒絕連線，請確認 Firebase Rules 規則。';
      }
    }

    function toggleView(isLoggedIn) {
      if (isLoggedIn) {
        authPanel.classList.add('hidden');
        mainContent.classList.remove('hidden');
        userDisplay.innerText = `👋 學員：${currentUser.email}`;
        userDisplay.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
      } else {
        authPanel.classList.remove('hidden');
        mainContent.classList.add('hidden');
        userDisplay.classList.add('hidden');
        logoutBtn.classList.add('hidden');
      }
    }

    // ==========================================
    // 💾 雲端資料庫同步
    // ==========================================
    function initUserDatabase(uid) {
      const batch = db.batch();
      defaultVocabularyList.forEach(item => {
        const docRef = db.collection('users').doc(uid).collection('progress').doc(item.id);
        batch.set(docRef, { status: 'fuzzy' });
      });
      batch.commit().then(() => {
        loadUserData(uid);
      }).catch(err => {
        console.error("雲端初始化失敗：", err);
        loadUserData(uid);
      });
    }

    function loadUserData(uid) {
      db.collection('users').doc(uid).collection('progress').get()
        .then(snapshot => {
          userProgress = {};
          if (snapshot.empty) {
            initUserDatabase(uid);
            return;
          }
          snapshot.forEach(doc => {
            userProgress[doc.id] = doc.data().status || 'fuzzy';
          });
          toggleView(true);
          renderVocabulary();
        })
        .catch(err => {
          console.error("載入雲端資料失敗：", err);
          toggleView(true);
          renderVocabulary();
        });
    }

    function updateCloudStatus(wordId, newStatus) {
      if (!currentUser) return;
      userProgress[wordId] = newStatus;
      db.collection('users').doc(currentUser.uid).collection('progress').doc(wordId).set({
        status: newStatus
      }, { merge: true })
      .then(() => {
        updateCounts();
      })
      .catch(err => console.error("雲端同步失敗：", err));
    }

    // ==========================================
    // 🎨 動態網頁渲染
    // ==========================================
    function renderVocabulary() {
      const recruitmentContainer = document.getElementById('recruitment-container');
      const contractContainer = document.getElementById('contract-container');

      recruitmentContainer.innerHTML = '';
      contractContainer.innerHTML = '';

      defaultVocabularyList.forEach(item => {
        const status = userProgress[item.id] || 'fuzzy';

        if (currentFilter === 'fuzzy' && status !== 'fuzzy') return;
        if (currentFilter === 'clear' && status !== 'clear') return;

        const borderClass = status === 'clear' ? 'border-green-500 shadow-green-50' : 'border-yellow-400 shadow-yellow-50';
        const bgBadge = status === 'clear' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800';

       // 智慧拆解例句：自動移除標點符號並嘗試進行單字原形還原比對
        const sentenceWords = item.sentence.split(' ');
        const wrappedSentence = sentenceWords.map(word => {
          // 清除標點符號
          let cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()'"“”]/g, "").toLowerCase();
          
          // 嘗試基礎的字尾還原（複數 s / 過去式 ed / 進行式 ing）
          let matchedKey = null;
          if (miniDict[cleanWord]) {
            matchedKey = cleanWord;
          } else if (cleanWord.endsWith('s') && miniDict[cleanWord.slice(0, -1)]) {
            matchedKey = cleanWord.slice(0, -1); // 去除 s
          } else if (cleanWord.endsWith('ed') && miniDict[cleanWord.slice(0, -2)]) {
            matchedKey = cleanWord.slice(0, -2); // 去除 ed
          } else if (cleanWord.endsWith('ing') && miniDict[cleanWord.slice(0, -3)]) {
            matchedKey = cleanWord.slice(0, -3); // 去除 ing
          } else if (cleanWord.endsWith('ly') && miniDict[cleanWord.slice(0, -2)]) {
            matchedKey = cleanWord.slice(0, -2); // 去除 ly
          }

          if (matchedKey) {
            // 用 event.stopPropagation() 防止彈窗被外層 document 的 click 監聽器秒殺關閉
            return `<span class="clickable-word" onclick="showPopover(event, '${matchedKey}')">${word}</span>`;
          }
          return word;
        }).join(' ');

        const cardHtml = `
          <div class="word-card bg-white rounded-2xl p-6 border-l-8 ${borderClass} shadow-md relative flex flex-col justify-between">
            <div>
              <div class="flex justify-between items-center mb-4">
                <span class="text-xs px-2.5 py-1 rounded-full font-bold uppercase tracking-wider ${bgBadge}">
                  ${status === 'clear' ? '🟢 清楚' : '🟡 模糊'}
                </span>
                <div class="flex gap-2">
                  <button onclick="updateCloudStatus('${item.id}', 'fuzzy')" class="p-1 px-2.5 text-xs font-semibold rounded-lg border border-yellow-300 hover:bg-yellow-50 text-yellow-600 transition">🟡 標記模糊</button>
                  <button onclick="updateCloudStatus('${item.id}', 'clear')" class="p-1 px-2.5 text-xs font-semibold rounded-lg border border-green-300 hover:bg-green-50 text-green-600 transition">🟢 標記清楚</button>
                </div>
              </div>

              <div class="flex items-center gap-2 mb-2">
                <h3 class="text-2xl font-bold text-slate-800">${item.word}</h3>
                <span class="text-sm font-mono text-slate-400">${item.ipa}</span>
                <button onclick="playAudio('${item.word}')" class="text-blue-500 hover:text-blue-700 transition p-1 text-lg"><i class="fa-solid fa-volume-high"></i></button>
              </div>

              <h4 class="text-lg font-semibold text-blue-600 mb-3">${item.translation}</h4>
              
              <div class="text-sm text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100 mb-4 leading-relaxed">
                <span class="font-bold text-slate-700">🌱 字根記憶：</span>${item.etymology}
                <div class="mt-2 text-xs text-orange-600 font-semibold"><i class="fa-solid fa-lightbulb"></i> 記憶提示：${item.hint}</div>
              </div>

              <div class="bg-blue-50/50 p-3.5 rounded-xl border border-blue-100 mb-4">
                <div class="flex justify-between items-center mb-1">
                  <span class="text-xs font-bold text-blue-800 uppercase tracking-wider">🎯 必考搭配詞</span>
                  <button onclick="playAudio('${item.collocation}')" class="text-blue-500 hover:text-blue-700 transition text-xs"><i class="fa-solid fa-volume-high"></i> 聽片語</button>
                </div>
                <div class="font-bold text-slate-800 text-sm">${item.collocation}</div>
                <div class="text-xs text-slate-500 mt-0.5">${item.collocationTranslation}</div>
              </div>
            </div>

            <div class="border-t border-slate-100 pt-4 mt-2">
              <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">📝 實戰商務例句</span>
                <button onclick="playAudio('${item.sentence.replace(/'/g, "\\'")}')" class="text-blue-500 hover:text-blue-700 transition text-xs"><i class="fa-solid fa-volume-high"></i> 聽整句</button>
              </div>
              <div class="text-slate-700 text-sm leading-relaxed mb-1.5">${wrappedSentence}</div>
              <div class="text-xs text-slate-500 font-medium">${item.sentenceTranslation}</div>
            </div>
          </div>
        `;

        if (item.category === 'recruitment') {
          recruitmentContainer.innerHTML += cardHtml;
        } else {
          contractContainer.innerHTML += cardHtml;
        }
      });

      updateCounts();
    }

    function updateCounts() {
      const counts = { all: 0, fuzzy: 0, clear: 0 };
      defaultVocabularyList.forEach(item => {
        counts.all++;
        const status = userProgress[item.id] || 'fuzzy';
        counts[status]++;
      });

      document.getElementById('count-all').innerText = counts.all;
      document.getElementById('count-fuzzy').innerText = counts.fuzzy;
      document.getElementById('count-clear').innerText = counts.clear;
    }

    function filterWords(type) {
      currentFilter = type;
      ['btn-all', 'btn-fuzzy', 'btn-clear'].forEach(id => {
        const btn = document.getElementById(id);
        btn.className = "px-5 py-2.5 rounded-xl font-semibold border transition";
      });

      const activeBtn = document.getElementById(`btn-${type}`);
      if (type === 'all') {
        activeBtn.className = "px-5 py-2.5 rounded-xl font-semibold bg-blue-600 text-white shadow-md shadow-blue-100 transition";
      } else if (type === 'fuzzy') {
        activeBtn.className = "px-5 py-2.5 rounded-xl font-semibold bg-yellow-400 text-slate-900 shadow-md shadow-yellow-100 transition";
      } else {
        activeBtn.className = "px-5 py-2.5 rounded-xl font-semibold bg-green-500 text-white shadow-md shadow-green-100 transition";
      }

      renderVocabulary();
    }

    // ==========================================
    // 🔊 智慧優化語音發音模組
    // ==========================================
    function playAudio(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        
        const premiumUSNames = [
          "Samantha (Enhanced)", 
          "Samantha", 
          "Ava (Enhanced)", 
          "Ava", 
          "Google US English", 
          "Microsoft Zira"
        ];
        
        const activeVoices = voices.filter(voice => {
          const name = voice.name.toLowerCase();
          return !name.includes('keynote') && 
                 !name.includes('bad') && 
                 !name.includes('bell') && 
                 !name.includes('cell') && 
                 !name.includes('organ') && 
                 !name.includes('freaky') &&
                 !name.includes('jester') &&
                 !name.includes('whisper') &&
                 !name.includes('boing');
        });
        
        let selectedVoice = null;
        for (const targetName of premiumUSNames) {
          selectedVoice = activeVoices.find(voice => voice.name === targetName);
          if (selectedVoice) break;
        }
        
        if (!selectedVoice) {
          selectedVoice = activeVoices.find(voice => voice.lang.includes('en-US'));
        }
        
        if (!selectedVoice) {
          selectedVoice = activeVoices.find(voice => voice.lang.startsWith('en'));
        }
        
        if (selectedVoice) {
          utterance.voice = selectedVoice;
        }
        
        utterance.lang = 'en-US';
        utterance.rate = 0.80;   // 自然舒服的商務朗讀速度
        utterance.pitch = 1.0;
        
        window.speechSynthesis.speak(utterance);
      } else {
        alert("不支援語音發音");
      }
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = function() {
        window.speechSynthesis.getVoices();
      };
    }

    // ==========================================
    // 💬 點擊單字彈窗與翻譯
    // ==========================================
    function showPopover(event, word) {
      event.stopPropagation();
      const info = miniDict[word];
      if (!info) return;

      const rect = event.target.getBoundingClientRect();
      const parts = info.split(') ');
      const ipaAndPart = parts[0] + ')';
      const trans = parts[1] || "";

      popoverWord.innerText = word.charAt(0).toUpperCase() + word.slice(1);
      popoverIpa.innerText = ipaAndPart;
      popoverTranslation.innerText = trans;

      popoverAudioWord = word;

      popoverBubble.style.display = 'block';
      popoverBubble.style.top = `${window.scrollY + rect.top - popoverBubble.offsetHeight - 10}px`;
      popoverBubble.style.left = `${window.scrollX + rect.left + (rect.width / 2) - (popoverBubble.offsetWidth / 2)}px`;

      playAudio(word);
    }

    function playPopoverAudio() {
      if (popoverAudioWord) {
        playAudio(popoverAudioWord);
      }
    }

    document.addEventListener('click', () => {
      popoverBubble.style.display = 'none';
    });
  </script>
</body>
</html>
