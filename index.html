<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOEIC 700+ 雲端大數據單字庫 v7.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    .word-card { transition: all 0.3s ease; }
    .word-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    /* 終極相容視覺：讓可點擊單字變成精美的互動標籤，在 Mac 上極易點選 */
    .clickable-word { 
      cursor: pointer; 
      color: #2563eb;
      font-weight: 500;
      border-bottom: 2px dashed #3b82f6; 
      display: inline-block; 
      padding: 0 2px;
      transition: all 0.2s;
    }
    .clickable-word:hover { 
      background-color: #dbeafe; 
      color: #1d4ed8; 
      border-radius: 4px; 
    }
    /* 嵌入式即時翻譯面板：不再使用絕對定位，100% 解決 Mac 座標當機問題 */
    .inline-translation-panel {
      display: none;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

  <nav class="bg-slate-900 text-white py-4 px-6 sticky top-0 z-40 shadow-md">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-database text-yellow-400 text-2xl"></i>
        <h1 class="text-xl font-bold tracking-wide">TOEIC 700+ 雲端動態大數據單字庫 <span class="text-xs bg-purple-600 px-2 py-0.5 rounded-full">v7.1</span></h1>
      </div>
      <div id="auth-section" class="flex items-center gap-4 text-sm">
        <span id="user-display" class="hidden text-slate-300"></span>
        <button id="logout-btn" class="hidden bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded transition">登出</button>
      </div>
    </div>
  </nav>

  <div id="auth-panel" class="max-w-md mx-auto my-12 p-8 bg-white rounded-2xl shadow-xl border border-slate-100">
    <h2 class="text-2xl font-bold text-center text-slate-900 mb-6" id="auth-title">學員登入</h2>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">電子信箱 (Email)</label>
        <input type="email" id="auth-email" placeholder="test@gmail.com" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">密碼 (Password)</label>
        <input type="password" id="auth-password" placeholder="請輸入密碼" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button id="auth-submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition shadow-md">登入</button>
      <div class="text-center text-sm text-slate-500 pt-2">
        <span id="auth-switch-text">還沒有帳號嗎？</span>
        <button id="auth-switch-btn" class="text-blue-600 font-semibold hover:underline">立即註冊新帳號</button>
      </div>
      <div id="auth-error" class="text-red-500 text-sm text-center hidden font-medium"></div>
    </div>
  </div>

  <main id="main-content" class="max-w-6xl mx-auto px-4 py-8 hidden">
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
      <div class="flex flex-wrap gap-2">
        <button onclick="filterWords('all')" id="btn-all" class="px-5 py-2.5 rounded-xl font-semibold bg-blue-600 text-white shadow-md transition">全部載入單字 (<span id="count-all">0</span>)</button>
        <button onclick="filterWords('fuzzy')" id="btn-fuzzy" class="px-5 py-2.5 rounded-xl font-semibold bg-white text-slate-600 hover:bg-slate-50 border border-slate-200 transition">🟡 模糊複習 (<span id="count-fuzzy">0</span>)</button>
        <button onclick="filterWords('clear')" id="btn-clear" class="px-5 py-2.5 rounded-xl font-semibold bg-white text-slate-600 hover:bg-slate-50 border border-slate-200 transition">🟢 清楚掌握 (<span id="count-clear">0</span>)</button>
      </div>
      <div class="text-sm font-medium text-slate-600 bg-purple-50 text-purple-700 px-4 py-2 rounded-xl">
        <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> v7.1 嵌入式技術：完美相容所有 Mac 裝置，點擊即可就地翻譯！
      </div>
    </div>

    <div id="vocabulary-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"></div>

    <div class="text-center hidden mb-12" id="load-more-block">
      <button id="load-more-btn" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-xl transition shadow-lg">
        <i class="fa-solid fa-angles-down mr-2"></i> 載入下一批多益單字
      </button>
    </div>
  </main>

  <script>
    // ==========================================
    // 🛠️ FIREBASE 配置
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBJngbs3_kCmJr-R6FxBqfwKblXyyu11Hg",
      authDomain: "toeic-database.firebaseapp.com",
      projectId: "toeic-database",
      storageBucket: "toeic-database.firebasestorage.app",
      messagingSenderId: "636706904817",
      appId: "1:636706904817:web:8293ac935dfb29ddac2750",
      measurementId: "G-S76H6VX1H0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 系統變數
    let currentUser = null;
    let loadedVocabulary = []; 
    let userProgress = {};     
    let currentFilter = 'all';
    const pageSize = 30;       
    let lastVisibleDoc = null; 

    let dynamicMiniDict = {};

    // DOM 元素
    const authPanel = document.getElementById('auth-panel');
    const mainContent = document.getElementById('main-content');
    const authEmail = document.getElementById('auth-email');
    const authPassword = document.getElementById('auth-password');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const authSwitchBtn = document.getElementById('auth-switch-btn');
    const authSwitchText = document.getElementById('auth-switch-text');
    const authTitle = document.getElementById('auth-title');
    const authError = document.getElementById('auth-error');
    const userDisplay = document.getElementById('user-display');
    const logoutBtn = document.getElementById('logout-btn');
    const loadMoreBlock = document.getElementById('load-more-block');
    const loadMoreBtn = document.getElementById('load-more-btn');

    let isRegisterMode = false;

    authSwitchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      authTitle.innerText = isRegisterMode ? "學員註冊" : "學員登入";
      authSubmitBtn.innerText = isRegisterMode ? "立即註冊" : "登入";
      authSwitchText.innerText = isRegisterMode ? "已經有帳號了？" : "還沒有帳號嗎？";
      authSwitchBtn.innerText = isRegisterMode ? "立即登入" : "註冊新帳號";
      authError.classList.add('hidden');
    });

    authSubmitBtn.addEventListener('click', () => {
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) return showAuthError("欄位不可留白！");

      if (isRegisterMode) {
        auth.createUserWithEmailAndPassword(email, password)
          .then(userCredential => { currentUser = userCredential.user; startApp(); })
          .catch(error => showAuthError("註冊失敗：" + translateAuthError(error.code)));
      } else {
        auth.signInWithEmailAndPassword(email, password)
          .then(userCredential => { currentUser = userCredential.user; startApp(); })
          .catch(error => showAuthError("登入失敗：" + translateAuthError(error.code)));
      }
    });

    logoutBtn.addEventListener('click', () => { auth.signOut().then(() => location.reload()); });
    auth.onAuthStateChanged(user => { if (user) { currentUser = user; startApp(); } else { toggleView(false); } });

    function showAuthError(msg) { authError.innerText = msg; authError.classList.remove('hidden'); }
    function translateAuthError(code) {
      if(code === 'auth/email-already-in-use') return '該信箱已被註冊。';
      if(code === 'auth/weak-password') return '密碼最少需 6 碼。';
      if(code === 'auth/wrong-password') return '密碼輸入錯誤。';
      return '連線拒絕，請確認資料庫規則。';
    }

    function toggleView(isLoggedIn) {
      if (isLoggedIn) {
        authPanel.classList.add('hidden'); mainContent.classList.remove('hidden');
        userDisplay.innerText = `👋 學員：${currentUser.email}`; userDisplay.classList.remove('hidden'); logoutBtn.classList.remove('hidden');
      } else {
        authPanel.classList.remove('hidden'); mainContent.classList.add('hidden'); userDisplay.classList.add('hidden'); logoutBtn.classList.add('hidden');
      }
    }

    function startApp() {
      toggleView(true);
      db.collection('users').doc(currentUser.uid).collection('progress').get()
        .then(snapshot => {
          userProgress = {};
          snapshot.forEach(doc => { userProgress[doc.id] = doc.data().status; });
          loadedVocabulary = [];
          lastVisibleDoc = null;
          fetchGlobalVocab();
        });
    }

    function fetchGlobalVocab() {
      let query = db.collection('global_vocab').orderBy('id').limit(pageSize);
      if (lastVisibleDoc) query = query.startAfter(lastVisibleDoc);

      query.get().then(snapshot => {
        if (snapshot.empty) {
          loadMoreBlock.classList.add('hidden');
          if(loadedVocabulary.length === 0) {
            document.getElementById('vocabulary-container').innerHTML = `
              <div class="col-span-full text-center p-8 bg-white rounded-2xl border border-dashed border-slate-300">
                <p class="text-lg font-bold text-slate-600 mb-2">雲端大數據單字庫目前是空的！</p>
                <p class="text-sm text-slate-400">請在 Console 貼上注入指令，將 5,000 個單字灌入資料庫中。</p>
              </div>`;
          }
          return;
        }

        lastVisibleDoc = snapshot.docs[snapshot.docs.length - 1];
        
        snapshot.forEach(doc => {
          const data = doc.data();
          loadedVocabulary.push(data);
          if(data.word) dynamicMiniDict[data.word.toLowerCase()] = `[${data.ipa || ''}] ${data.translation}`;
          if(data.collocation) dynamicMiniDict[data.collocation.toLowerCase()] = data.collocationTranslation || '';
        });

        loadMoreBlock.classList.remove('hidden');
        renderVocabulary();
      }).catch(err => console.error("加載失敗:", err));
    }

    loadMoreBtn.addEventListener('click', () => { fetchGlobalVocab(); });

    function updateCloudStatus(wordId, newStatus) {
      if (!currentUser) return;
      userProgress[wordId] = newStatus;
      renderVocabulary();
      updateCounts();

      db.collection('users').doc(currentUser.uid).collection('progress').doc(wordId).set({
        status: newStatus
      }, { merge: true }).catch(err => console.error(err));
    }

    // 動態網頁渲染（v7.1 核心改良：就地嵌入式翻譯面板設計）
    function renderVocabulary() {
      const container = document.getElementById('vocabulary-container');
      container.innerHTML = '';

      loadedVocabulary.forEach((item, index) => {
        const status = userProgress[item.id] || 'fuzzy';

        if (currentFilter === 'fuzzy' && status !== 'fuzzy') return;
        if (currentFilter === 'clear' && status !== 'clear') return;

        const borderClass = status === 'clear' ? 'border-green-500 shadow-green-50' : 'border-yellow-400 shadow-yellow-50';
        const bgBadge = status === 'clear' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800';

        // 智慧拆解例句：點擊時直接調用「就地切換面板」函數 toggleInlineTranslation
        const sentenceWords = item.sentence.split(' ');
        const wrappedSentence = sentenceWords.map(word => {
          let cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()'"區域“”]/g, "").toLowerCase();
          if (dynamicMiniDict[cleanWord] || cleanWord === item.word.toLowerCase()) {
            return `<span class="clickable-word" onclick="toggleInlineTranslation(event, '${cleanWord}', '${item.id}_${index}')">${word}</span>`;
          }
          return word;
        }).join(' ');

        container.innerHTML += `
          <div class="word-card bg-white rounded-2xl p-6 border-l-8 ${borderClass} shadow-md relative flex flex-col justify-between">
            <div>
              <div class="flex justify-between items-center mb-4">
                <span class="text-xs px-2.5 py-1 rounded-full font-bold tracking-wider ${bgBadge}">${status === 'clear' ? '🟢 清楚' : '🟡 模糊'}</span>
                <div class="flex gap-2">
                  <button onclick="updateCloudStatus('${item.id}', 'fuzzy')" class="p-1 px-2.5 text-xs font-semibold rounded-lg border border-yellow-300 hover:bg-yellow-50 text-yellow-600 transition">🟡 模糊</button>
                  <button onclick="updateCloudStatus('${item.id}', 'clear')" class="p-1 px-2.5 text-xs font-semibold rounded-lg border border-green-300 hover:bg-green-50 text-green-600 transition">🟢 清楚</button>
                </div>
              </div>
              <div class="flex items-center gap-2 mb-2">
                <h3 class="text-2xl font-bold text-slate-800">${item.word}</h3>
                <span class="text-sm font-mono text-slate-400">${item.ipa}</span>
                <button onclick="playAudio('${item.word}')" class="text-blue-500 hover:text-blue-700 transition p-1 text-lg"><i class="fa-solid fa-volume-high"></i></button>
              </div>
              <h4 class="text-lg font-semibold text-blue-600 mb-3">${item.translation}</h4>
              <div class="text-sm text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100 mb-4 leading-relaxed">
                <span class="font-bold text-slate-700">🌱 記憶法：</span>${item.etymology || '多益常考核心單字'}
              </div>
              <div class="bg-blue-50/50 p-3.5 rounded-xl border border-blue-100 mb-4">
                <div class="flex justify-between items-center mb-1">
                  <span class="text-xs font-bold text-blue-800 tracking-wider">🎯 必考搭配詞</span>
                  <button onclick="playAudio('${item.collocation}')" class="text-blue-500 hover:text-blue-700 transition text-xs"><i class="fa-solid fa-volume-high"></i> 聽片語</button>
                </div>
                <div class="font-bold text-slate-800 text-sm">${item.collocation}</div>
                <div class="text-xs text-slate-500 mt-0.5">${item.collocationTranslation}</div>
              </div>
            </div>
            
            <div class="border-t border-slate-100 pt-4 mt-2">
              <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-slate-400 tracking-wider">📝 實戰商務例句</span>
                <button onclick="playAudio('${item.sentence.replace(/'/g, "\\'")}')" class="text-blue-500 hover:text-blue-700 transition text-xs"><i class="fa-solid fa-volume-high"></i> 聽整句</button>
              </div>
              <div class="text-slate-700 text-sm leading-relaxed mb-1.5">${wrappedSentence}</div>
              <div class="text-xs text-slate-500 font-medium">${item.sentenceTranslation}</div>
              
              <div id="inline-panel-${item.id}_${index}" class="inline-translation-panel mt-3 p-3 bg-slate-900 text-white rounded-xl text-xs border border-slate-800 shadow-inner">
                <div class="flex justify-between items-center mb-1 border-b border-slate-800 pb-1">
                  <span id="inline-word-${item.id}_${index}" class="font-bold text-yellow-400 text-sm uppercase"></span>
                  <span id="inline-ipa-${item.id}_${index}" class="text-slate-400 font-mono"></span>
                </div>
                <div id="inline-trans-${item.id}_${index}" class="text-slate-200 font-medium mt-1 leading-relaxed"></div>
              </div>
            </div>
          </div>`;
      });
      updateCounts();
    }

    function updateCounts() {
      const counts = { all: loadedVocabulary.length, fuzzy: 0, clear: 0 };
      loadedVocabulary.forEach(item => {
        const status = userProgress[item.id] || 'fuzzy';
        counts[status]++;
      });
      document.getElementById('count-all').innerText = counts.all;
      document.getElementById('count-fuzzy').innerText = counts.fuzzy;
      document.getElementById('count-clear').innerText = counts.clear;
    }

    function filterWords(type) {
      currentFilter = type;
      ['btn-all', 'btn-fuzzy', 'btn-clear'].forEach(id => { document.getElementById(id).className = "px-5 py-2.5 rounded-xl font-semibold border transition"; });
      const activeBtn = document.getElementById(`btn-${type}`);
      if (type === 'all') activeBtn.className = "px-5 py-2.5 rounded-xl font-semibold bg-blue-600 text-white shadow-md transition";
      else if (type === 'fuzzy') activeBtn.className = "px-5 py-2.5 rounded-xl font-semibold bg-yellow-400 text-slate-900 shadow-md transition";
      else activeBtn.className = "px-5 py-2.5 rounded-xl font-semibold bg-green-500 text-white shadow-md transition";
      renderVocabulary();
    }

    // ==========================================
    // 🔊 四國口音智慧輪播發音模組
    // ==========================================
    function playAudio(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const toeicVoices = {
          us: ["Ava (Enhanced)", "Ava", "Google US English", "Samantha"],
          gb: ["Serena (Enhanced)", "Serena", "Daniel"],
          au: ["Karen (Enhanced)", "Karen"],
          ca: ["Moira (Enhanced)", "Moira"]
        };
        let selectedVoice = null;
        const isLongText = text.trim().includes(" ");
        if (isLongText) {
          const countries = ["us", "gb", "au", "ca"];
          const randomCountry = countries[Math.floor(Math.random() * countries.length)];
          for (const name of toeicVoices[randomCountry]) {
            selectedVoice = voices.find(v => v.name === name); if (selectedVoice) break;
          }
        }
        if (!selectedVoice) {
          for (const name of toeicVoices.us) { selectedVoice = voices.find(v => v.name === name); if (selectedVoice) break; }
        }
        if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('en-US'));
        if (selectedVoice) { utterance.voice = selectedVoice; utterance.lang = selectedVoice.lang; }
        utterance.rate = isLongText ? 0.88 : 0.80;
        window.speechSynthesis.speak(utterance);
      }
    }

    // ==========================================
    // 💬 v7.1 終極解決：就地嵌入式面板切換邏輯
    // ==========================================
    function toggleInlineTranslation(event, word, elementId) {
      if (event) { event.stopPropagation(); event.preventDefault(); }
      
      const panel = document.getElementById(`inline-panel-${elementId}`);
      const wordTitle = document.getElementById(`inline-word-${elementId}`);
      const ipaSpan = document.getElementById(`inline-ipa-${elementId}`);
      const transDiv = document.getElementById(`inline-trans-${elementId}`);
      
      // 1. 如果點擊的單字面板目前是開著的，就將其收合關閉
      if (panel.style.display === 'block') {
        panel.style.display = 'none';
        return;
      }
      
      // 先把當前單字卡裡可能開著的其他面板全部暗中關閉，保持畫面整潔
      const cardPanels = targetContainer = event.target.closest('.border-t').querySelectorAll('.inline-translation-panel');
      cardPanels.forEach(p => p.style.display = 'none');

      // 2. 獲取字典中英對照資訊
      let info = dynamicMiniDict[word];
      if (!info) info = `[TOEIC] 多益核心衍伸字彙。`;

      const parts = info.split(') ');
      const ipaText = parts[0].includes('[') ? parts[0] + ')' : '';
      const translationText = parts[1] || parts[0];

      // 3. 填入資訊並就地展開
      wordTitle.innerText = word;
      ipaSpan.innerText = ipaText;
      transDiv.innerText = translationText;
      panel.style.display = 'block';

      // 4. 強制同步高階美音朗讀
      playAudio(word);
    }
  </script>
</body>
</html>
